<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Journal — Typography</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Lato:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f0f5ec;
    --parchment: #deebd5;
    --warm-brown: #5c7040;
    --dark-brown: #2e4020;
    --terracotta: #c85a2a;
    --sage: #7aaa5a;
    --sand: #b8d4a0;
    --muted: #6a8a55;
    --white: #f8fcf4;
    --shadow: rgba(46,64,32,0.13);
    --gold: #d4a040;
    --rust: #b84020;
  }

  body {
    background: var(--cream);
    font-family: 'Lato', sans-serif;
    color: var(--dark-brown);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(160deg, #c8ddb8 0%, #a8c890 50%, #7aaa6a 100%);
    padding: 32px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 4px 16px rgba(100,160,80,0.25);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '🌿';
    position: absolute;
    right: 220px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 5rem;
    opacity: 0.12;
    pointer-events: none;
  }
  .header::after {
    content: '✦';
    position: absolute;
    left: 36%;
    top: 14px;
    font-size: 0.7rem;
    color: rgba(212,160,64,0.5);
    letter-spacing: 8px;
    pointer-events: none;
  }
  .header-left h1 {
    font-family: 'DM Serif Display', 'Cormorant Garamond', serif;
    font-size: 2.5rem;
    font-weight: 400;
    font-style: italic;
    color: #2e4020;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 6px rgba(255,255,255,0.35);
  }
  .header-left h1 span {
    color: #6a3a10;
  }
  .header-left p {
    color: rgba(46,64,32,0.65);
    font-size: 0.72rem;
    font-weight: 400;
    font-style: italic;
    margin-top: 4px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .header-right {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .btn-primary {
    background: linear-gradient(135deg, #c85a2a, #9a3a10);
    color: #fff;
    border: none;
    padding: 11px 24px;
    border-radius: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.8px;
    transition: all 0.2s;
    box-shadow: 0 3px 14px rgba(200,90,42,0.4);
    text-transform: uppercase;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(200,90,42,0.55); }
  .btn-secondary {
    background: transparent;
    color: var(--sand);
    border: 1px solid var(--sand);
    padding: 9px 18px;
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { background: var(--sand); color: var(--dark-brown); }

  /* ── FILTERS ── */
  .filter-bar {
    background: var(--parchment);
    border-bottom: 1px solid var(--sand);
    border-top: 3px solid var(--warm-brown);
    padding: 14px 40px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--warm-brown);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-right: 4px;
  }
  .filter-chip {
    background: transparent;
    border: 1.5px solid var(--sand);
    color: var(--warm-brown);
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Lato', sans-serif;
  }
  .filter-chip:hover, .filter-chip.active {
    background: var(--terracotta);
    border-color: var(--terracotta);
    color: #fff;
    box-shadow: 0 2px 10px rgba(200,90,42,0.3);
  }
  .search-wrap {
    margin-left: auto;
  }
  .search-input {
    background: var(--white);
    border: 1.5px solid var(--sand);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-family: 'Lato', sans-serif;
    color: var(--dark-brown);
    width: 220px;
    outline: none;
  }
  .search-input:focus { border-color: var(--warm-brown); }
  .search-input::placeholder { color: var(--muted); }

  /* ── GRID ── */
  .main { padding: 36px 40px; }
  .stats-row {
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--white);
    border: 1px solid var(--sand);
    border-left: 4px solid var(--terracotta);
    border-radius: 8px;
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 100px;
    box-shadow: 0 2px 8px var(--shadow);
    transition: transform 0.2s;
  }
  .stat-chip { cursor: pointer; }
  .stat-chip:hover { transform: translateY(-2px); box-shadow: 0 4px 16px var(--shadow); }
  .stat-chip.active-stat { border-left-color: #a84828; background: #fdf3ec; }
  .stat-chip .num {
    font-family: 'DM Serif Display', 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 400;
    color: var(--terracotta);
    line-height: 1;
  }
  .stat-chip .lbl {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 3px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
  }

  /* ── CARDS ── */
  .card {
    background: var(--white);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    border: 1px solid rgba(212,184,150,0.4);
  }
  .card { border-top: 3px solid var(--sand); }
  .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(46,64,32,0.18); border-top-color: var(--terracotta); }

  .card-img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    background: var(--parchment);
  }
  .card-img-placeholder {
    width: 100%;
    height: 180px;
    background: linear-gradient(135deg, var(--parchment) 0%, var(--sand) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
  }
  .card-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .badge-dream { background: #f5e0c0; color: #7a5c3a; border: 1px solid #d4a870; font-style: italic; }
  .badge-planning { background: #d4eacc; color: #3d5a35; border: 1px solid #90b878; }
  .badge-done { background: #c8603a; color: #fff; border: 1px solid #a84828; letter-spacing: 0.5px; }
  .badge-again { background: #7a9e7e; color: #fff; border: 1px solid #5a7e5e; letter-spacing: 0.5px; }

  .card-body { padding: 18px 20px 20px; }
  .card-type {
    font-size: 0.72rem;
    font-style: italic;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-bottom: 5px;
  }
  .card-title {
    font-family: 'DM Serif Display', 'Playfair Display', serif;
    font-weight: 400;
    font-size: 1.3rem;
    color: var(--dark-brown);
    line-height: 1.25;
    margin-bottom: 8px;
    letter-spacing: 0.2px;
  }
  .card-excerpt {
    font-size: 0.84rem;
    color: var(--warm-brown);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer {
    padding: 10px 20px 14px;
    border-top: 1px solid var(--parchment);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    background: var(--parchment);
    color: var(--warm-brown);
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.72rem;
    font-weight: 700;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    grid-column: 1 / -1;
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
  .empty-state h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--warm-brown);
    margin-bottom: 8px;
  }

  /* ── MODAL OVERLAY ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(74,46,26,0.5);
    z-index: 100;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 40px 20px;
  }
  .overlay.open { display: flex; }

  /* ── ADD / EDIT FORM ── */
  .form-modal {
    background: var(--white);
    border-radius: 14px;
    width: 100%;
    max-width: 640px;
    padding: 36px 40px;
    position: relative;
    box-shadow: 0 12px 48px rgba(0,0,0,0.25);
  }
  .form-modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--dark-brown);
    margin-bottom: 24px;
  }
  .form-row { margin-bottom: 18px; }
  .form-row label {
    display: block;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--warm-brown);
    margin-bottom: 6px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--cream);
    border: 1.5px solid var(--sand);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    color: var(--dark-brown);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--warm-brown);
  }
  .form-textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .notes-section { margin-top: 6px; }
  .notes-section-title {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 1rem;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px dashed var(--sand);
    margin-top: 20px;
  }

  .form-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .btn-danger {
    background: transparent;
    border: 1.5px solid #c1694f;
    color: #c1694f;
    padding: 9px 18px;
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    margin-right: auto;
    transition: all 0.2s;
  }
  .btn-danger:hover { background: #c1694f; color: var(--white); }

  .close-btn {
    position: absolute;
    top: 18px;
    right: 20px;
    background: none;
    border: none;
    font-size: 1.4rem;
    color: var(--muted);
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }
  .close-btn:hover { color: var(--dark-brown); }

  /* ── DETAIL VIEW ── */
  .detail-modal {
    background: var(--white);
    border-radius: 14px;
    width: 100%;
    max-width: 720px;
    overflow: hidden;
    box-shadow: 0 12px 48px rgba(0,0,0,0.25);
    position: relative;
  }
  .detail-img {
    width: 100%;
    height: 260px;
    object-fit: cover;
  }
  .detail-img-placeholder {
    width: 100%;
    height: 260px;
    background: linear-gradient(135deg, var(--parchment), var(--sand));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
  }
  .detail-body { padding: 32px 36px; }
  .detail-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .detail-type {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }
  .detail-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--dark-brown);
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .detail-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }

  .notes-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 8px;
  }
  .note-block {
    background: var(--cream);
    border-radius: 10px;
    padding: 16px 18px;
    border-left: 3px solid var(--sand);
  }
  .note-block.full { grid-column: 1 / -1; }
  .note-block h4 {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--warm-brown);
    margin-bottom: 8px;
  }
  .note-block p {
    font-size: 0.88rem;
    line-height: 1.65;
    color: var(--dark-brown);
    white-space: pre-wrap;
  }
  .detail-actions {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  /* ── AUTH ── */
  .auth-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(74,46,26,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .auth-overlay.open { display: flex; }
  .auth-box {
    background: var(--white);
    border-radius: 14px;
    padding: 40px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 12px 48px rgba(0,0,0,0.3);
  }
  .auth-box .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .auth-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--dark-brown);
    margin-bottom: 8px;
  }
  .auth-box p { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .auth-error { color: var(--terracotta); font-size: 0.82rem; margin-top: 10px; min-height: 18px; }

  /* ── LINKS SECTION ── */
  .links-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .links-input-row input { flex: 1; }
  .link-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--parchment);
    border-radius: 6px;
    padding: 6px 12px;
    margin-bottom: 6px;
  }
  .link-item a {
    flex: 1;
    color: var(--warm-brown);
    text-decoration: none;
    font-size: 0.85rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .link-item a:hover { text-decoration: underline; }
  .link-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0 2px;
  }
  .link-remove:hover { color: var(--terracotta); }

    /* ── NAV TABS ── */
  .nav-tabs {
    background: linear-gradient(135deg, #3a4a2e, #5a6b48);
    display: flex;
    gap: 0;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .nav-tab {
    padding: 12px 28px;
    background: transparent;
    border: none;
    color: var(--sand);
    font-family: 'Lato', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .nav-tab:hover { color: var(--cream); }
  .nav-tab.active { color: var(--terracotta); border-bottom-color: var(--terracotta); }

  /* ── INSPIRATION ── */
  .insp-search-bar {
    padding: 16px 40px;
    background: var(--parchment);
    border-bottom: 1px solid var(--sand);
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .insp-region-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .insp-chip {
    background: transparent;
    border: 1.5px solid var(--sand);
    color: var(--warm-brown);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    transition: all 0.2s;
  }
  .insp-chip:hover, .insp-chip.active { background: var(--warm-brown); border-color: var(--warm-brown); color: var(--white); }

  .insp-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    padding: 28px 40px;
  }
  .country-card {
    background: var(--white);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    cursor: pointer;
    border: 1px solid rgba(212,184,150,0.4);
    box-shadow: 0 1px 6px var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .country-card:hover { transform: translateY(-3px); box-shadow: 0 6px 18px var(--shadow); }
  .country-flag { font-size: 2.4rem; margin-bottom: 8px; line-height: 1; }
  .country-name { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--dark-brown); margin-bottom: 4px; }
  .country-region { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 10px; }
  .country-add-btn {
    background: var(--terracotta);
    color: var(--white);
    border: none;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.75rem;
    font-family: 'Lato', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .country-add-btn:hover { background: #a8573e; }
  .country-visited-btn {
  padding: 7px 10px;
  background: var(--terracotta, #c47a5a);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.78rem;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.2s, opacity 0.2s;
  white-space: nowrap;
}
.country-visited-btn:hover:not(:disabled) {
  background: #a85e3e;
}
.country-visited-btn.visited-done {
  background: #7a9e7e;
  cursor: default;
  opacity: 0.85;
}

.country-add-btn.added { background: var(--sage); cursor: default; }

  @media (max-width: 600px) {
    .header { padding: 20px; flex-direction: column; gap: 14px; align-items: flex-start; }
    .filter-bar { padding: 12px 16px; }
    .main { padding: 20px 16px; }
    .form-modal { padding: 24px 20px; }
    .form-row-2 { grid-template-columns: 1fr; }
    .notes-grid { grid-template-columns: 1fr; }
    .detail-body { padding: 20px; }
    .search-wrap { width: 100%; }
    .search-input { width: 100%; }
  }
</style>
</head>
<body>

<!-- AUTH OVERLAY -->
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-box">
    <div class="icon">🔒</div>
    <h2>Mel's Travel Scrapbook</h2>
    <p>Enter the password to add or edit destinations.</p>
    <input class="form-input" type="password" id="auth-input" placeholder="Password" style="text-align:center;margin-bottom:4px;" onkeydown="if(event.key==='Enter')checkAuth()">
    <div class="auth-error" id="auth-error"></div>
    <button class="btn-primary" style="margin-top:14px;width:100%;" onclick="checkAuth()">Enter</button>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <h1>✈ Mel's Travel Scrapbook</h1>
    <p>Destinations · Road Trips · Research</p>
  </div>
  <div class="header-right">
    <button class="btn-secondary" onclick="exportData()" title="Download your scrapbook as a backup file">⬇ Export</button>
    <label class="btn-secondary" style="cursor:pointer;" title="Restore from a backup file">⬆ Import<input type="file" accept=".json" style="display:none;" onchange="importData(event)"></label>
    <button class="btn-secondary" onclick="requireAuth(openAddModal)">+ Add Destination</button>
  </div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs">
  <button class="nav-tab active" id="tab-scrapbook" onclick="switchTab('scrapbook')">📖 My Scrapbook</button>
  <button class="nav-tab" id="tab-inspiration" onclick="switchTab('inspiration')">🌍 Country Explorer</button>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label">Status</span>
  <button class="filter-chip active" data-filter="status" data-val="all" onclick="setFilter('status','all',this)">All</button>
  <button class="filter-chip" data-filter="status" data-val="dream" onclick="setFilter('status','dream',this)">✨ Dream</button>
  <button class="filter-chip" data-filter="status" data-val="planning" onclick="setFilter('status','planning',this)">📋 Planning</button>
  <button class="filter-chip" data-filter="status" data-val="visited" onclick="setFilter('status','visited',this)">✅ Been There</button>
    <button class="filter-chip" data-filter="status" data-val="again" onclick="setFilter('status','again',this)">🔁 Visit Again</button>

  <span class="filter-label" style="margin-left:12px;">Type</span>
  <button class="filter-chip active" data-filter="type" data-val="all" onclick="setFilter('type','all',this)">All</button>
  <button class="filter-chip" data-filter="type" data-val="road trip" onclick="setFilter('type','road trip',this)">🚗 Road Trip</button>
  <button class="filter-chip" data-filter="type" data-val="city break" onclick="setFilter('type','city break',this)">🏙 City Break</button>
  <button class="filter-chip" data-filter="type" data-val="beach" onclick="setFilter('type','beach',this)">🏖 Beach</button>
  <button class="filter-chip" data-filter="type" data-val="nature" onclick="setFilter('type','nature',this)">🌿 Nature</button>
  <button class="filter-chip" data-filter="type" data-val="cultural" onclick="setFilter('type','cultural',this)">🏛 Cultural</button>

  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="🔍 Search destinations…" oninput="renderGrid()" id="search-input">
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="stats-row" id="stats-row"></div>
  <div class="grid" id="grid"></div>
</div>

<!-- INSPIRATION SECTION -->
<div id="inspiration-section" style="display:none;">
  <div class="insp-search-bar">
    <input class="search-input" type="text" id="insp-search" placeholder="🔍 Search countries or regions…" oninput="filterCountries()" style="width:300px;">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div class="insp-region-chips" id="insp-region-chips"></div>
      <button id="hide-visited-btn" class="insp-chip" onclick="toggleHideVisited(this)" style="margin-left:8px;background:var(--white);border:2px solid var(--border);">🙈 Hide Visited</button>
    </div>
  </div>
  <div class="insp-grid" id="insp-grid"></div>
</div>

<!-- ADD/EDIT OVERLAY -->
<div class="overlay" id="form-overlay">
  <div class="form-modal">
    <button class="close-btn" onclick="closeFormModal()">✕</button>
    <h2 id="form-title">New Destination</h2>

    <div class="form-row-2">
      <div class="form-row">
        <label>Destination Name *</label>
        <input class="form-input" id="f-name" placeholder="e.g. Tuscany, Italy" type="text">
      </div>
      <div class="form-row">
        <label>Country / Region</label>
        <input class="form-input" id="f-country" placeholder="e.g. Italy" type="text">
      </div>
    </div>

    <div class="form-row-2">
      <div class="form-row">
        <label>Trip Type</label>
        <select class="form-select" id="f-type">
          <option value="road trip">🚗 Road Trip</option>
          <option value="city break">🏙 City Break</option>
          <option value="beach">🏖 Beach</option>
          <option value="nature">🌿 Nature</option>
          <option value="cultural">🏛 Cultural</option>
          <option value="other">✈ Other</option>
        </select>
      </div>
      <div class="form-row">
        <label>Status</label>
        <select class="form-select" id="f-status">
          <option value="dream">✨ Dream</option>
          <option value="planning">📋 Planning</option>
          <option value="visited">✅ Been There</option>
              <option value="again">🔁 Visit Again</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <label>Cover Image URL</label>
      <input class="form-input" id="f-img" placeholder="Paste an image URL (optional)" type="url">
    </div>

    <div class="form-row">
      <label>Cover Emoji (if no image)</label>
      <input class="form-input" id="f-emoji" placeholder="e.g. 🌋 🏔 🌊 🏜" type="text" maxlength="4">
    </div>

    <div class="form-row">
      <label>Tags (comma separated)</label>
      <input class="form-input" id="f-tags" placeholder="e.g. wine, mountains, hiking" type="text">
    </div>

    <div class="notes-section-title">Research Notes</div>

    <div class="form-row">
      <label>General Notes</label>
      <textarea class="form-textarea" id="f-notes-general" placeholder="Anything goes — ideas, thoughts, first impressions…"></textarea>
    </div>

    <div class="form-row-2">
      <div class="form-row">
        <label>🛏 Where to Stay</label>
        <textarea class="form-textarea" id="f-notes-stay" placeholder="Hotels, Airbnbs, camping spots…"></textarea>
      </div>
      <div class="form-row">
        <label>🍽 Where to Eat</label>
        <textarea class="form-textarea" id="f-notes-eat" placeholder="Restaurants, local markets, must-tries…"></textarea>
      </div>
    </div>

    <div class="form-row-2">
      <div class="form-row">
        <label>📍 Things to Do</label>
        <textarea class="form-textarea" id="f-notes-do" placeholder="Sights, activities, day trips…"></textarea>
      </div>
      <div class="form-row">
        <label>🚗 Getting There / Around</label>
        <textarea class="form-textarea" id="f-notes-transport" placeholder="Driving tips, routes, transfers…"></textarea>
      </div>
    </div>

    <div class="form-row">
      <label>💡 Tips & Warnings</label>
      <textarea class="form-textarea" id="f-notes-tips" placeholder="Practical tips, things to avoid, best time to go…"></textarea>
    </div>

    <div class="form-row">
      <label>🔗 Useful Links</label>
      <div class="links-input-row">
        <input class="form-input" id="f-link-input" placeholder="Paste a URL and press Add" type="url" onkeydown="if(event.key==='Enter'){event.preventDefault();addLink();}">
        <button class="btn-secondary" onclick="addLink()" style="white-space:nowrap;">Add</button>
      </div>
      <div id="f-links-list"></div>
    </div>

    <div class="form-actions">
      <button class="btn-danger" id="delete-btn" onclick="deleteDestination()" style="display:none;">Delete</button>
      <button class="btn-secondary" onclick="closeFormModal()">Cancel</button>
      <button class="btn-primary" onclick="saveDestination()">Save Destination</button>
    </div>
  </div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="detail-overlay">
  <div class="detail-modal" id="detail-modal">
    <button class="close-btn" style="position:absolute;top:14px;right:16px;z-index:2;background:rgba(255,255,255,0.8);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;" onclick="closeDetail()">✕</button>
    <div id="detail-content"></div>
  </div>
</div>

<script>
// ── DATA ──
const PASS = 'travel2024';
// ── BACKEND API ───────────────────────────────────────────────────────────────
const API_URL = 'https://base44.app/api/apps/69e0d5b1a62a9bab40c37f8c/functions/travelScrapbook';
let destinations = [];
let filters = { status: 'all', type: 'all' };
let editingId = null;
let pendingAction = null;
let isAuthed = false;
let editLinks = [];
let _authPassword = null;

async function apiGet() {
  const r = await fetch(API_URL);
  if (!r.ok) throw new Error('Failed to load');
  return r.json();
}
async function apiCreate(dest) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Password': _authPassword },
    body: JSON.stringify(dest)
  });
  if (!r.ok) throw new Error('Failed to save');
  return r.json();
}
async function apiUpdate(id, dest) {
  const r = await fetch(API_URL + '?id=' + id, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Password': _authPassword },
    body: JSON.stringify(dest)
  });
  if (!r.ok) throw new Error('Failed to update');
  return r.json();
}
async function apiDelete(id) {
  const r = await fetch(API_URL + '?id=' + id, {
    method: 'DELETE',
    headers: { 'X-Password': _authPassword }
  });
  if (!r.ok) throw new Error('Failed to delete');
}
async function loadData() {
  try {
    destinations = await apiGet();
    renderGrid();
    renderCountries();
  } catch(e) {
    console.error('loadData error:', e);
    showToast('Could not load data: ' + e.message);
  }
}
function save() {} // no-op — writes go direct via API

// ── AUTH ──
function requireAuth(action) {
  if (isAuthed) { action(); return; }
  pendingAction = action;
  document.getElementById('auth-overlay').classList.add('open');
  setTimeout(() => document.getElementById('auth-input').focus(), 100);
}

function checkAuth() {
  const val = document.getElementById('auth-input').value;
  if (val === PASS) {
    isAuthed = true;
    _authPassword = val;
    sessionStorage.setItem('ts_authed', 'yes');
    sessionStorage.setItem('ts_pw', val);
    document.getElementById('auth-overlay').classList.remove('open');
    document.getElementById('auth-input').value = '';
    document.getElementById('auth-error').textContent = '';
    if (pendingAction) { pendingAction(); pendingAction = null; }
  } else {
    document.getElementById('auth-error').textContent = 'Wrong password. Try again.';
  }
}

// ── FILTERS ──
function clickStat(val) {
  // Activate the matching filter-chip button in the status row
  const chip = document.querySelector(`.filter-chip[data-filter="status"][data-val="${val}"]`);
  if (chip) setFilter('status', val, chip);
}

function setFilter(key, val, el) {
  filters[key] = val;
  document.querySelectorAll(`[data-filter="${key}"]`).forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

// ── GRID ──
function renderGrid() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let list = destinations.filter(d => {
    if (filters.status !== 'all' && d.status !== filters.status) return false;
    if (filters.type !== 'all' && d.type !== filters.type) return false;
    if (q && !d.name.toLowerCase().includes(q) && !(d.country||'').toLowerCase().includes(q) && !(d.tags||'').toLowerCase().includes(q)) return false;
    return true;
  });

  // Stats
  const statsEl = document.getElementById('stats-row');
  statsEl.innerHTML = `
    <div class="stat-chip ${filters.status==='all'?'active-stat':''}" onclick="clickStat('all')"><span class="num">${destinations.length}</span><span class="lbl">Total</span></div>
    <div class="stat-chip ${filters.status==='dream'?'active-stat':''}" onclick="clickStat('dream')"><span class="num">${destinations.filter(d=>d.status==='dream').length}</span><span class="lbl">Dreams</span></div>
    <div class="stat-chip ${filters.status==='planning'?'active-stat':''}" onclick="clickStat('planning')"><span class="num">${destinations.filter(d=>d.status==='planning').length}</span><span class="lbl">Planning</span></div>
    <div class="stat-chip ${filters.status==='visited'?'active-stat':''}" onclick="clickStat('visited')"><span class="num">${destinations.filter(d=>d.status==='visited').length}</span><span class="lbl">Visited</span></div>
    <div class="stat-chip ${filters.status==='again'?'active-stat':''}" onclick="clickStat('again')"><span class="num">${destinations.filter(d=>d.status==='again').length}</span><span class="lbl">Visit Again</span></div>
  `;

  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🗺</div><h3>No destinations yet</h3><p>Click "Add Destination" to start your scrapbook.</p></div>`;
    return;
  }

  grid.innerHTML = list.map(d => {
    const imgEl = d.img
      ? `<img class="card-img" src="${d.img}" alt="${d.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-img-placeholder" style="display:none">${d.emoji||'🌍'}</div>`
      : `<div class="card-img-placeholder">${d.emoji||'🌍'}</div>`;
    const badgeCls = { dream:'badge-dream', planning:'badge-planning', visited:'badge-done', again:'badge-again' }[d.status] || 'badge-dream';
    const badgeTxt = { dream:'✨ Dream', planning:'📋 Planning', visited:'✅ Visited', again:'🔁 Visit Again' }[d.status] || '';
    const tags = d.tags ? d.tags.split(',').map(t=>t.trim()).filter(Boolean).map(t=>`<span class="tag">${t}</span>`).join('') : '';
    const excerpt = d.notes_general || d.notesGeneral || d.notes_stay || d.notes_stay||d.notesStay || d.notes_eat || d.notes_eat||d.notesEat || 'No notes yet.';
    return `<div class="card" onclick="openDetail('${d.id}')">
      <div style="position:relative;">
        ${imgEl}
        <span class="card-badge ${badgeCls}">${badgeTxt}</span>
      </div>
      <div class="card-body">
        <div class="card-type">${typeLabel(d.type)} ${d.country ? '· ' + d.country : ''}</div>
        <div class="card-title">${d.name}</div>
        <div class="card-excerpt">${excerpt}</div>
      </div>
      ${tags ? `<div class="card-footer">${tags}</div>` : ''}
    </div>`;
  }).join('');
}

function typeLabel(t) {
  return { 'road trip':'🚗 Road Trip','city break':'🏙 City Break','beach':'🏖 Beach','nature':'🌿 Nature','cultural':'🏛 Cultural','other':'✈ Other' }[t] || t || '';
}

// ── ADD / EDIT FORM ──
function openAddModal() {
  editingId = null;
  editLinks = [];
  document.getElementById('form-title').textContent = 'New Destination';
  document.getElementById('delete-btn').style.display = 'none';
  ['name','country','img','emoji','tags','notes-general','notes-stay','notes-eat','notes-do','notes-transport','notes-tips'].forEach(k => {
    const el = document.getElementById('f-'+k);
    if (el) el.value = '';
  });
  document.getElementById('f-type').value = 'road trip';
  document.getElementById('f-status').value = 'dream';
  renderLinksList();
  document.getElementById('form-overlay').classList.add('open');
}

function openEditModal(id) {
  const d = destinations.find(x => x.id === id);
  if (!d) return;
  editingId = id;
  editLinks = d.links ? [...d.links] : [];
  document.getElementById('form-title').textContent = 'Edit Destination';
  document.getElementById('delete-btn').style.display = 'block';
  document.getElementById('f-name').value = d.name || '';
  document.getElementById('f-country').value = d.country || '';
  document.getElementById('f-img').value = d.img || '';
  document.getElementById('f-emoji').value = d.emoji || '';
  document.getElementById('f-tags').value = d.tags || '';
  document.getElementById('f-type').value = d.type || 'road trip';
  document.getElementById('f-status').value = d.status || 'dream';
  document.getElementById('f-notes-general').value = d.notes_general || d.notesGeneral || '';
  document.getElementById('f-notes-stay').value = d.notes_stay || d.notes_stay||d.notesStay || '';
  document.getElementById('f-notes-eat').value = d.notes_eat || d.notes_eat||d.notesEat || '';
  document.getElementById('f-notes-do').value = d.notes_do || d.notes_do||d.notesDo || '';
  document.getElementById('f-notes-transport').value = d.notes_transport || d.notes_transport||d.notesTransport || '';
  document.getElementById('f-notes-tips').value = d.notes_tips || d.notes_tips||d.notesTips || '';
  renderLinksList();
  document.getElementById('form-overlay').classList.add('open');
  document.getElementById('detail-overlay').classList.remove('open');
}

function closeFormModal() {
  document.getElementById('form-overlay').classList.remove('open');
}

async function saveDestination() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Please enter a destination name.'); return; }

  const d = {
    name,
    country: document.getElementById('f-country').value.trim(),
    img: document.getElementById('f-img').value.trim(),
    emoji: document.getElementById('f-emoji').value.trim() || '🌍',
    tags: document.getElementById('f-tags').value.trim(),
    type: document.getElementById('f-type').value,
    status: document.getElementById('f-status').value,
    notes_general: document.getElementById('f-notes-general').value.trim(),
    notes_stay: document.getElementById('f-notes-stay').value.trim(),
    notes_eat: document.getElementById('f-notes-eat').value.trim(),
    notes_do: document.getElementById('f-notes-do').value.trim(),
    notes_transport: document.getElementById('f-notes-transport').value.trim(),
    notes_tips: document.getElementById('f-notes-tips').value.trim(),
    links: editLinks
  };

  try {
    if (editingId) {
      const updated = await apiUpdate(editingId, d);
      const idx = destinations.findIndex(x => x.id === editingId);
      if (idx >= 0) destinations[idx] = updated;
    } else {
      const created = await apiCreate(d);
      destinations.unshift(created);
    }
    closeFormModal();
    renderGrid();
    showToast('Destination saved!');
  } catch(e) {
    showToast('Save failed — check connection.');
  }
}

async function deleteDestination() {
  if (!confirm('Delete this destination? This cannot be undone.')) return;
  try {
    await apiDelete(editingId);
    destinations = destinations.filter(x => x.id !== editingId);
    closeFormModal();
    renderGrid();
    showToast('Destination deleted.');
  } catch(e) {
    showToast('Delete failed — check connection.');
  }
}

// ── LINKS ──
function addLink() {
  const input = document.getElementById('f-link-input');
  const url = input.value.trim();
  if (!url) return;
  editLinks.push(url);
  input.value = '';
  renderLinksList();
}

function removeLink(i) {
  editLinks.splice(i, 1);
  renderLinksList();
}

function renderLinksList() {
  const el = document.getElementById('f-links-list');
  if (!editLinks.length) { el.innerHTML = ''; return; }
  el.innerHTML = editLinks.map((u,i) => `
    <div class="link-item">
      <a href="${u}" target="_blank" rel="noopener">${u}</a>
      <button class="link-remove" onclick="removeLink(${i})">✕</button>
    </div>`).join('');
}

// ── DETAIL VIEW ──
function openDetail(id) {
  const d = destinations.find(x => x.id === id);
  if (!d) return;

  const imgEl = d.img
    ? `<img class="detail-img" src="${d.img}" alt="${d.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="detail-img-placeholder" style="display:none">${d.emoji||'🌍'}</div>`
    : `<div class="detail-img-placeholder">${d.emoji||'🌍'}</div>`;

  const badgeCls = { dream:'badge-dream', planning:'badge-planning', visited:'badge-done', again:'badge-again' }[d.status] || '';
  const badgeTxt = { dream:'✨ Dream', planning:'📋 Planning', visited:'✅ Visited', again:'🔁 Visit Again' }[d.status] || '';
  const tags = d.tags ? d.tags.split(',').map(t=>t.trim()).filter(Boolean).map(t=>`<span class="tag">${t}</span>`).join('') : '';

  const noteBlocks = [
    (d.notes_general||d.notesGeneral) ? `<div class="note-block full"><h4>📝 General Notes</h4><p>${d.notes_general||d.notesGeneral}</p></div>` : '',
    d.notes_stay||d.notesStay ? `<div class="note-block"><h4>🛏 Where to Stay</h4><p>${d.notes_stay||d.notesStay}</p></div>` : '',
    d.notes_eat||d.notesEat ? `<div class="note-block"><h4>🍽 Where to Eat</h4><p>${d.notes_eat||d.notesEat}</p></div>` : '',
    d.notes_do||d.notesDo ? `<div class="note-block"><h4>📍 Things to Do</h4><p>${d.notes_do||d.notesDo}</p></div>` : '',
    d.notes_transport||d.notesTransport ? `<div class="note-block"><h4>🚗 Getting There</h4><p>${d.notes_transport||d.notesTransport}</p></div>` : '',
    d.notes_tips||d.notesTips ? `<div class="note-block full"><h4>💡 Tips & Warnings</h4><p>${d.notes_tips||d.notesTips}</p></div>` : '',
  ].filter(Boolean).join('');

  const linksHtml = d.links && d.links.length
    ? `<div class="note-block full"><h4>🔗 Useful Links</h4>${d.links.map(u=>`<div style="margin-bottom:4px;"><a href="${u}" target="_blank" rel="noopener" style="color:var(--warm-brown);font-size:0.85rem;">${u}</a></div>`).join('')}</div>`
    : '';

  document.getElementById('detail-content').innerHTML = `
    <div style="position:relative;">${imgEl}</div>
    <div class="detail-body">
      <div class="detail-meta">
        <span class="card-badge ${badgeCls}" style="position:static;">${badgeTxt}</span>
        <span class="detail-type">${typeLabel(d.type)}${d.country ? ' · ' + d.country : ''}</span>
      </div>
      <div class="detail-title">${d.name}</div>
      ${tags ? `<div class="detail-tags">${tags}</div>` : ''}
      ${noteBlocks || linksHtml ? `<div class="notes-grid">${noteBlocks}${linksHtml}</div>` : '<p style="color:var(--muted);font-size:0.88rem;">No notes added yet.</p>'}
      <div class="detail-actions">
        <button class="btn-primary" onclick="requireAuth(()=>openEditModal('${d.id}'))">✏ Edit</button>
        <button class="btn-secondary" onclick="closeDetail()">Close</button>
      </div>
    </div>`;

  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
}

// ── CLOSE ON BACKGROUND CLICK ──
document.getElementById('form-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeFormModal();
});
document.getElementById('detail-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});
document.getElementById('auth-overlay').addEventListener('click', function(e) {
  if (e.target === this) {
    this.classList.remove('open');
    pendingAction = null;
  }
});


// ── TABS ──
let activeTab = 'scrapbook';
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-scrapbook').classList.toggle('active', tab === 'scrapbook');
  document.getElementById('tab-inspiration').classList.toggle('active', tab === 'inspiration');
  document.querySelector('.filter-bar').style.display = tab === 'scrapbook' ? '' : 'none';
  document.querySelector('.main').style.display = tab === 'scrapbook' ? '' : 'none';
  document.getElementById('inspiration-section').style.display = tab === 'inspiration' ? '' : 'none';
  if (tab === 'inspiration') renderCountries();
}

// ── COUNTRY DATA ──

const REGIONS = ['All', 'Europe', 'Asia', 'Africa', 'Americas', 'Oceania'];
let activeRegion = 'All';
let hideVisited = false;

function renderCountries() {
  // Render region chips
  const chipsEl = document.getElementById('insp-region-chips');
  chipsEl.innerHTML = REGIONS.map(r =>
    `<button class="insp-chip${r === activeRegion ? ' active' : ''}" onclick="setRegion('${r}',this)">${r}</button>`
  ).join('');
  filterCountries();
}

function toggleHideVisited(btn) {
  hideVisited = !hideVisited;
  btn.style.background = hideVisited ? 'var(--terracotta)' : 'var(--white)';
  btn.style.color = hideVisited ? '#fff' : '';
  btn.style.borderColor = hideVisited ? 'var(--terracotta)' : 'var(--border)';
  btn.textContent = hideVisited ? '👁 Show Visited' : '🙈 Hide Visited';
  filterCountries();
}

function setRegion(r, el) {
  activeRegion = r;
  document.querySelectorAll('.insp-chip').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  filterCountries();
}

function filterCountries() {
  const q = (document.getElementById('insp-search').value || '').toLowerCase();
  const visitedSet = new Set(destinations.filter(d => d.status === 'visited').map(d => d.name.toLowerCase()));
  let list = COUNTRIES.filter(c => {
    if (activeRegion !== 'All' && c.region !== activeRegion) return false;
    if (q && !c.name.toLowerCase().includes(q)) return false;
    if (hideVisited && visitedSet.has(c.name.toLowerCase())) return false;
    return true;
  });
  list = list.slice().sort((a, b) => a.name.localeCompare(b.name));
  const grid = document.getElementById('insp-grid');
  if (!list.length) {
    grid.innerHTML = '<p style="color:var(--muted);padding:20px;">No countries found.</p>';
    return;
  }
  const existingNames = new Set(destinations.map(d => d.name.toLowerCase()));
  const visitedNames  = new Set(destinations.filter(d => d.status === 'visited').map(d => d.name.toLowerCase()));
  grid.innerHTML = list.map(c => {
    const alreadyAdded   = existingNames.has(c.name.toLowerCase());
    const alreadyVisited = visitedNames.has(c.name.toLowerCase());
    return `<div class="country-card">
      <div class="country-flag">${c.flag}</div>
      <div class="country-name">${c.name}</div>
      <div class="country-region">${c.region}</div>
      <button class="country-add-btn${alreadyAdded ? ' added' : ''}"
        onclick="${alreadyAdded ? '' : `addFromInspiration('${c.name.replace(/'/g,"\'")}','${c.flag}','${c.region}')`}"
        ${alreadyAdded ? 'disabled' : ''}>
        ${alreadyAdded ? '✓ In Scrapbook' : '+ Add to Scrapbook'}
      </button>
      <button class="country-visited-btn${alreadyVisited ? ' visited-done' : ''}"
        onclick="${alreadyVisited ? '' : `markVisited('${c.name.replace(/'/g,"\'")}','${c.flag}','${c.region}')`}"
        ${alreadyVisited ? 'disabled' : ''}>
        ${alreadyVisited ? '✓ Visited' : '📍 Mark as Visited'}
      </button>
    </div>`;
  }).join('');
}

function addFromInspiration(name, flag, region) {
  requireAuth(() => {
    editingId = null;
    editLinks = [];
    document.getElementById('form-title').textContent = 'New Destination';
    document.getElementById('delete-btn').style.display = 'none';
    ['img','tags','notes-general','notes-stay','notes-eat','notes-do','notes-transport','notes-tips'].forEach(k => {
      const el = document.getElementById('f-'+k);
      if (el) el.value = '';
    });
    document.getElementById('f-name').value = name;
    document.getElementById('f-country').value = region;
    document.getElementById('f-emoji').value = flag;
    document.getElementById('f-type').value = 'city break';
    document.getElementById('f-status').value = 'dream';
    renderLinksList();
    document.getElementById('form-overlay').classList.add('open');
  });
}

function markVisited(name, flag, region) {
  requireAuth(async () => {
    const existing = destinations.find(d => d.name.toLowerCase() === name.toLowerCase());
    try {
      if (existing) {
        const updated = await apiUpdate(existing.id, { ...existing, status: 'visited', links: existing.links || [] });
        const idx = destinations.findIndex(x => x.id === existing.id);
        if (idx >= 0) destinations[idx] = updated;
        showToast(`${flag} ${name} marked as visited!`);
      } else {
        const newDest = { name, country: region, emoji: flag, type: 'city break', status: 'visited', img: '', tags: '', notes_general: '', notes_stay: '', notes_eat: '', notes_do: '', notes_transport: '', notes_tips: '', links: [] };
        const created = await apiCreate(newDest);
        destinations.push(created);
        showToast(`${flag} ${name} added to your Visited list!`);
      }
      renderGrid();
      renderCountries();
    } catch(e) {
      showToast('Could not save — check connection.');
    }
  });
}

// ── TOAST NOTIFICATIONS ──
function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#3a3a2a;color:#f5f0e8;padding:10px 22px;border-radius:24px;font-size:0.9rem;font-family:Lato,sans-serif;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.3);';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2800);
}

// ── EXPORT ──
function exportData() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    destinations: destinations
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = `travel-scrapbook-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── IMPORT ──
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.destinations || !Array.isArray(data.destinations)) {
        alert('Invalid backup file — no destinations found.');
        return;
      }
      const action = confirm(
        `This backup contains ${data.destinations.length} destination(s).\n\n` +
        `Merge with your current scrapbook? (OK = merge, Cancel = replace everything)`
      );
      if (action) {
        // Merge — add imported items that don't already exist (by id)
        const existingIds = new Set(destinations.map(d => d.id));
        const newItems = data.destinations.filter(d => !existingIds.has(d.id));
        destinations = [...destinations, ...newItems];
        alert(`Merged ${newItems.length} new destination(s) into your scrapbook.`);
      } else {
        destinations = data.destinations;
        alert(`Replaced scrapbook with ${destinations.length} destination(s) from backup.`);
      }
      save();
      renderGrid();
    } catch(err) {
      alert('Could not read backup file. Make sure it is a valid scrapbook export.');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}
